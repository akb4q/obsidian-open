<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening Obsidian...</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #1a1a1a; color: #eee; text-align: center; }
        .loader { border: 3px solid #444; border-top: 3px solid #7b68ee; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { background: #7b68ee; color: white; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-size: 1.1em; font-weight: bold; margin-top: 20px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .btn:active { transform: scale(0.98); }
        p { margin: 5px 0; color: #aaa; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p>正在唤起 Obsidian...</p>
    
    <!-- Direct button for reliability -->
    <a id="manual-link" class="btn" href="#">点击打开 Obsidian</a>
    
    <p id="status" style="margin-top:15px;">如果未自动跳转，请点击上方按钮</p>

    <script>
        const params = new URLSearchParams(window.location.search);
        const vault = params.get('vault') || 'obsidian-vault';
        const file = params.get('file');
        
        if (file) {
            const deepLink = `obsidian://open?vault=${vault}&file=${file}`;
            const btn = document.getElementById('manual-link');
            btn.href = deepLink;

            // Try auto-redirect with a slight delay
            setTimeout(() => {
                window.location.href = deepLink;
            }, 500);
        } else {
            document.getElementById('status').innerText = "未检测到文件参数";
            document.querySelector('.loader').style.display = 'none';
        }
    </script>
</body>
</html>
