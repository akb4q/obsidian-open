<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening Obsidian...</title>
    <style>
        body { font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #202020; color: #eee; }
        .loader { border: 4px solid #555; border-top: 4px solid #7b68ee; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        a { color: #7b68ee; text-decoration: none; font-size: 1.2em; }
        p { margin: 5px 0; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p>正在唤起 Obsidian...</p>
    <p id="manual" style="display:none">若未自动跳转，请 <a id="link" href="#">点击此处</a></p>

    <script>
        const params = new URLSearchParams(window.location.search);
        const vault = params.get('vault') || 'obsidian-vault';
        const file = params.get('file');
        if (file) {
            const deepLink = `obsidian://open?vault=${vault}&file=${file}`;
            window.location.href = deepLink;
            const el = document.getElementById('link');
            el.href = deepLink;
            document.getElementById('manual').style.display = 'block';
        }
    </script>
</body>
</html>
